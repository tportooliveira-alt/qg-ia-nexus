services:
  - type: web
    name: qg-ia-nexus
    env: node
    plan: free
    buildCommand: cd apps/api && npm install
    startCommand: node apps/api/server.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ENABLE_WHATSAPP
        value: false
      - key: QG_AUTH_TOKEN
        value: 4ddd7e8d65d766c2e353f00e16325ec8e4a6ff9252e46517ea11b8cc691855b1
      - key: FABRICA_API_URL
        value: https://fabrica-ia-api.onrender.com
      - key: FABRICA_API_KEY
        value: qgia-fabrica-2026
